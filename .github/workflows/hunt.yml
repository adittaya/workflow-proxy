name: hunt

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -q -e .
      - name: Configure Supabase
        run: |
          mkdir -p ~/.config/vplink-hunter
          cat > ~/.config/vplink-hunter/config.json << CONFIG
          {
            "supabase_url": "$SUPABASE_URL",
            "service_key": "$SUPABASE_SERVICE_KEY",
            "anon_key": ""
          }
          CONFIG
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      - name: Run hunter
        run: |
          echo "::group::Hunter Start"
          vplink-hunter --once 2>&1
          echo "::endgroup::"
      - name: Summary
        run: |
          vplink-hunter --db-stats 2>&1 || true
          vplink-hunter --list --limit 5 2>&1 || true
