name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - run: python -m pip install --upgrade pip
      - run: pip install -e .
      - run: python -c "import vplink_hunter; print('package imports OK')"
      - run: python -c "from vplink_hunter.cli import main; print('CLI entry point OK')"
      - run: python -c "from vplink_hunter.engine1_generator import scrape_lists; print('E1 imports OK')"
      - run: python -c "from vplink_hunter.engine2_tester import worker, test_ip; print('E2 imports OK')"
      - run: python -c "from vplink_hunter.engine3_verifier import verify, check_vplink, check_download; print('E3 imports OK')"
      - run: python -c "from vplink_hunter.supabase_client import init, upsert_proxy, get_stats, get_counts; print('Supabase client imports OK')"
      - run: python -c "from vplink_hunter.config import load, save, get; print('Config imports OK')"

  install-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: bash install.sh
        env:
          TERM: dumb
      - run: |
          export PATH="$HOME/.local/bin:$PATH"
          source "$HOME/.bashrc" 2>/dev/null || true
          vplink-hunter --help
      - run: |
          export PATH="$HOME/.local/bin:$PATH"
          vplink-hunter --status

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install pycodestyle
      - run: pycodestyle --max-line-length=120 \
              vplink_hunter/cli.py \
              vplink_hunter/config.py \
              vplink_hunter/supabase_client.py \
              proxy_pull.py \
              proxy_finder.py \
              proxy_hunter.py || true
